<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{name}}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange:  #ea580c;
      --teal:    #0f766e;
      --teal-m:  #0d9488;
      --dark:    #0c111b;
      --card:    rgba(255,255,255,.04);
      --border:  rgba(255,255,255,.08);
      --text:    #f9fafb;
      --muted:   rgba(249,250,251,.60);
      --radius:  18px;
      --shadow:  0 4px 24px rgba(0,0,0,.36);
    }

    html, body {
      width: 100%; height: 100%;
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      background: linear-gradient(160deg, #0c111b 0%, #0f1623 60%, #0d1a14 100%);
      color: var(--text);
      overflow: hidden;
    }
    body.preview  { overflow-y: auto; height: auto; }
    body.published { overflow: hidden; height: 100vh; }

    /* ══ SHELL — 2-column asymmetric grid ══ */
    .shell {
      width: min(1280px, 98vw);
      margin: 0 auto;
      padding: 14px 16px;
      height: 100vh;
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      grid-template-rows: auto 1fr auto;
      gap: 12px;
    }
    body.preview .shell { height: auto; min-height: 100vh; }

    /* ══ HEADER — full width ══ */
    .hdr {
      grid-column: 1 / -1;
      display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
      padding: 10px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0; flex-wrap: wrap;
    }
    .hdr-brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .hdr-brand img {
      height: 28px; width: 58px; object-fit: contain;
      border-radius: 8px; flex-shrink: 0;
    }
    .hdr-brand-text { min-width: 0; }
    .hdr-brand-text strong {
      display: block;
      font-family: "Outfit", sans-serif;
      font-size: .82rem; font-weight: 800;
      color: var(--orange);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;
    }
    .hdr-brand-text span {
      display: block; font-size: .65rem; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px;
    }
    .hdr-tag {
      font-size: .68rem; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase;
      color: var(--teal-m);
      padding: 5px 11px;
      background: rgba(15,118,110,.18);
      border: 1px solid rgba(15,118,110,.32);
      border-radius: 10px;
      white-space: nowrap;
    }

    /* ══ MIDDLE LEFT — Hero card (full-bleed image) ══ */
    .hero-card {
      grid-column: 1;
      grid-row: 2;
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      min-height: 0;
      box-shadow: var(--shadow);
    }
    .hero-card img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to right, rgba(12,17,27,.90) 38%, rgba(12,17,27,.12) 100%);
      display: flex; align-items: center;
      padding: 32px 28px;
    }
    .hero-copy { max-width: 68%; display: flex; flex-direction: column; gap: 10px; }
    .hero-badge {
      width: fit-content;
      background: linear-gradient(135deg, var(--orange), var(--teal));
      padding: 5px 13px; border-radius: 99px;
      font-size: .67rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .1em;
    }
    .hero-copy h1 {
      font-family: "Outfit", sans-serif;
      font-size: clamp(1.5rem, 2.6vw, 2.6rem);
      font-weight: 900; line-height: 1.0; letter-spacing: -.02em;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    }
    .hero-copy p {
      font-size: .82rem; color: var(--muted); line-height: 1.55;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }

    /* ══ MIDDLE RIGHT — About panel (full-height) ══ */
    .about-panel {
      grid-column: 2;
      grid-row: 2;
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      min-height: 0;
      box-shadow: var(--shadow);
    }
    .about-panel img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .about-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(12,17,27,.98) 42%, rgba(12,17,27,.30) 100%);
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 20px 18px;
    }
    .about-overlay small {
      font-family: "Outfit", sans-serif;
      font-size: .64rem; font-weight: 800;
      color: var(--orange); text-transform: uppercase; letter-spacing: .14em;
      margin-bottom: 6px;
    }
    .about-overlay h2 {
      font-family: "Outfit", sans-serif;
      font-size: clamp(.95rem, 1.4vw, 1.35rem);
      font-weight: 800; line-height: 1.1;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      margin-bottom: 8px;
    }
    .about-overlay p {
      font-size: .78rem; color: var(--muted); line-height: 1.55;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 4; -webkit-box-orient: vertical;
    }

    /* ══ BOTTOM LEFT — Services ══ */
    .services-bar {
      grid-column: 1;
      grid-row: 3;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 10px;
      overflow: hidden;
    }
    .services-bar .bar-title {
      font-family: "Outfit", sans-serif;
      font-size: .9rem; font-weight: 800; flex-shrink: 0;
    }
    .svc-scroll {
      flex: 1; overflow-y: auto;
      display: flex; gap: 10px; flex-wrap: wrap; align-content: flex-start;
    }

    /* service cards from backend */
    .creative-card {
      flex: 1 1 140px; min-width: 130px; max-width: 210px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      display: flex; flex-direction: column; gap: 6px;
      overflow: hidden;
    }
    .card-index {
      font-family: "Outfit", sans-serif;
      font-size: 1rem; font-weight: 900;
      color: var(--orange); line-height: 1;
    }
    .creative-card-image {
      width: 100%; height: 52px;
      object-fit: cover; border-radius: 8px;
      display: block; flex-shrink: 0;
    }
    .card-content h3 {
      font-family: "Outfit", sans-serif;
      font-size: .78rem; font-weight: 700;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 1; -webkit-box-orient: vertical;
    }
    .card-content p {
      font-size: .7rem; color: var(--muted); line-height: 1.35;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }

    /* ══ BOTTOM RIGHT — Contact ══ */
    .contact-bar {
      grid-column: 2;
      grid-row: 3;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 8px;
      overflow: hidden;
    }
    .contact-bar .bar-title {
      font-family: "Outfit", sans-serif;
      font-size: .9rem; font-weight: 800;
      color: var(--orange); flex-shrink: 0;
    }
    .contact-bar .ct-items {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .contact-bar .ct-items span {
      font-size: .72rem; color: var(--text);
      padding: 4px 9px;
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px;
    }
    .contact-bar .contact-links {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .contact-bar .contact-links .btn {
      display: inline-flex; align-items: center;
      padding: 6px 12px; border-radius: 9px;
      text-decoration: none; font-size: .73rem; font-weight: 700;
      transition: opacity .2s;
    }
    .contact-bar .contact-links .btn:hover { opacity: .8; }
    .contact-bar .contact-links .btn-call { background: var(--orange); color: #fff; }
    .contact-bar .contact-links .btn-wa   { background: #25d366; color: #fff; }
    .contact-bar .contact-links .btn-map  { background: var(--teal); color: #fff; }
    .contact-bar .contact-links .btn-ig   { background: linear-gradient(135deg,#f09433,#dc2743,#bc1888); color:#fff; }
    .contact-bar .contact-links .btn-tw   { background: #1da1f2; color: #fff; }
    .contact-bar .contact-links .btn-yt   { background: #ff0000; color: #fff; }

    /* ── Mobile ── */
    @media (max-width: 860px) {
      html, body { overflow-y: auto; height: auto; }
      .shell {
        height: auto;
        grid-template-columns: 1fr;
        grid-template-rows: auto;
      }
      .hdr          { grid-column: 1; grid-row: 1; }
      .hero-card    { grid-column: 1; grid-row: 2; aspect-ratio: 16/9; }
      .about-panel  { grid-column: 1; grid-row: 3; aspect-ratio: 4/3; }
      .services-bar { grid-column: 1; grid-row: 4; }
      .contact-bar  { grid-column: 1; grid-row: 5; }
      .hero-overlay { padding: 20px; }
      .hero-copy    { max-width: 90%; }
      .svc-scroll   { overflow-y: visible; }
    }
  </style>
</head>
<body class="preview">
<div class="shell">

  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-brand">
      <img src="{{logo}}" alt="{{name}} logo" />
      <div class="hdr-brand-text">
        <strong>{{name}}</strong>
        <span>{{tagline}}</span>
      </div>
    </div>
    <span class="hdr-tag">Creative Studio</span>
    <img src="/nit-trichy-logo.png" alt="NIT Trichy"
         style="height:28px;width:58px;object-fit:contain;border-radius:6px;" />
  </header>

  <!-- HERO (left, large) -->
  <div class="hero-card">
    <img src="{{hero_image}}" alt="{{name}}"
         onerror="this.onerror=null;this.src='https://picsum.photos/seed/creative/1200/800';" />
    <div class="hero-overlay">
      <div class="hero-copy">
        <span class="hero-badge">{{hours}}</span>
        <h1>{{name}}</h1>
        <p>{{tagline}}</p>
      </div>
    </div>
  </div>

  <!-- ABOUT (right, tall) -->
  <div class="about-panel">
    <img src="{{about_image}}" alt="About {{name}}"
         onerror="this.onerror=null;this.src='https://picsum.photos/seed/about/800/900';" />
    <div class="about-overlay">
      <small>The Studio</small>
      <h2>Who We Are</h2>
      <p>{{description}}</p>
    </div>
  </div>

  <!-- SERVICES (bottom left) -->
  <div class="services-bar">
    <div class="bar-title">What We Offer</div>
    <div class="svc-scroll">
      {{services}}
    </div>
  </div>

  <!-- CONTACT (bottom right) -->
  <div class="contact-bar">
    <div class="bar-title">Connect</div>
    <div class="ct-items">
      <span>{{phone}}</span>
      <span>{{email}}</span>
      <span>{{address}}</span>
      <span>{{hours}}</span>
    </div>
    {{contact_links}}
  </div>

</div>
</body>
</html>
