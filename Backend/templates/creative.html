<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{name}}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Brand Color System override variables */
      --primary: #ea580c;
      --secondary: #0f766e;
      --accent: #ea580c;
      --background: #0c111b;
      --text: #f9fafb;
      --gradient: linear-gradient(135deg, var(--primary), var(--secondary));
      --text-on-primary: #ffffff;
      --text-on-gradient: #ffffff;
      --text-rgb: 249, 250, 251;
      --secondary-rgb: 15, 118, 110;
      --background-rgb: 12, 17, 27;

      --orange:  var(--primary);
      --teal:    var(--secondary);
      --bg:      var(--background);
      --card:    rgba(var(--text-rgb), 0.04);
      --border:  rgba(var(--text-rgb), 0.08);
      --text:    var(--text);
      --muted:   rgba(var(--text-rgb), 0.6);
      --radius:  18px;
    }

    html, body {
      width: 100%;
      margin: 0;
      padding: 0;
      font-family: "Plus Jakarta Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    /* â”€â”€ Preview vs Published â”€â”€ */
    body.preview {
      overflow-y: auto;
      height: auto;
    }
    body.published {
      height: 100vh;
      overflow: hidden;
    }

    /* â”€â”€ Container: asymmetric 2-column grid â”€â”€ */
    .container {
      max-width: 1140px;
      margin: 0 auto;
      padding: 24px 20px;
      display: grid;
      grid-template-columns: 1.4fr 0.6fr;
      grid-template-rows: auto 1fr auto;
      gap: 14px;
      height: 100%;
    }

    body.preview .container { min-height: 100vh; }
    body.published .container { height: 100vh; overflow: hidden; }

    /* â”€â”€ Header: spans full width â”€â”€ */
    .header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      flex-shrink: 0;
      padding: 12px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand img {
      height: 38px;
      width: auto;
      object-fit: contain;
      flex-shrink: 0;
      border-radius: 8px;
    }

    .brand-text { min-width: 0; }

    .brand-text strong {
      display: block;
      font-family: "Outfit", sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--orange);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .brand-text span {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .header-tag {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
      padding: 5px 10px;
      background: rgba(var(--secondary-rgb), 0.15);
      border: 1px solid rgba(var(--secondary-rgb), 0.3);
      border-radius: 10px;
    }

    /* â”€â”€ Hero: left column, large â”€â”€ */
    .hero {
      grid-column: 1;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 0;
      overflow: hidden;
    }

    .hero-card {
      flex: 1;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background:
        linear-gradient(to right, rgba(var(--background-rgb), 0.92) 40%, rgba(var(--background-rgb), 0.3) 100%),
        url('{{hero_image}}') center/cover no-repeat;
      display: flex;
      align-items: center;
      padding: 28px;
      min-height: 0;
    }

    .hero-content {
      max-width: 85%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .hero-tag {
      width: fit-content;
      background: linear-gradient(135deg, var(--orange), var(--teal));
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .hero-content h1 {
      font-family: "Outfit", sans-serif;
      font-size: clamp(1.6rem, 3vw, 2.8rem);
      font-weight: 900;
      line-height: 1.0;
      letter-spacing: -0.02em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .hero-content p {
      font-size: clamp(0.8rem, 1.1vw, 0.92rem);
      color: var(--muted);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* â”€â”€ Services: left column, below hero â”€â”€ */
    .services {
      grid-column: 1;
      grid-row: 3;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 16px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      flex-shrink: 0;
    }

    .section-title {
      font-family: "Outfit", sans-serif;
      font-size: 0.95rem;
      font-weight: 800;
      color: var(--text);
    }

    .services-grid {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .creative-card {
      flex: 1;
      min-width: 150px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow: hidden;
    }

    .card-index {
      font-family: "Outfit", sans-serif;
      font-size: 1.1rem;
      font-weight: 900;
      color: var(--orange);
      line-height: 1;
    }

    .creative-card-image {
      width: 100%;
      height: 56px;
      object-fit: cover;
      border-radius: 10px;
      display: block;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .card-content h3 {
      font-family: "Outfit", sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-content p {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* â”€â”€ Right column: about + cta stacked â”€â”€ */
    .about-panel {
      grid-column: 2;
      grid-row: 2 / 4;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 0;
    }

    .about-card {
      flex: 1;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background:
        linear-gradient(to top, rgba(var(--background-rgb), 0.97) 40%, rgba(var(--background-rgb), 0.5) 100%),
        url('{{about_image}}') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      min-height: 0;
    }

    .about-overlay {
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-top: 1px solid var(--border);
    }

    .about-overlay small {
      font-family: "Outfit", sans-serif;
      font-size: 0.68rem;
      font-weight: 800;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .about-overlay h2 {
      font-family: "Outfit", sans-serif;
      font-size: clamp(1rem, 1.5vw, 1.4rem);
      font-weight: 800;
      line-height: 1.1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .about-overlay p {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .cta {
      flex-shrink: 0;
      padding: 14px 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .cta strong {
      font-family: "Outfit", sans-serif;
      font-size: 0.74rem;
      font-weight: 800;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .cta-items {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .cta-items span {
      font-size: 0.72rem;
      color: var(--text);
      padding: 4px 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px;
    }

    img { max-width: 100%; height: auto; object-fit: cover; }

    /* ── Contact Links ── */
    .contact-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .contact-links .btn {
      display: inline-flex;
      align-items: center;
      padding: 8px 13px;
      border-radius: 10px;
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 700;
      transition: opacity 0.2s;
    }

    .contact-links .btn:hover { opacity: 0.8; }
    .contact-links .btn-call { background: var(--orange); color: var(--text-on-primary); }
    .contact-links .btn-wa { background: #25d366; color: #fff; }
    .contact-links .btn-map { background: var(--teal); color: var(--text-on-gradient); }
    .contact-links .btn-ig { background: linear-gradient(135deg, #f09433, #dc2743, #bc1888); color: #fff; }
    .contact-links .btn-tw { background: #1da1f2; color: #fff; }
    .contact-links .btn-yt { background: #ff0000; color: #fff; }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto auto;
      }
      .header { grid-column: 1; grid-row: 1; }
      .hero { grid-column: 1; grid-row: 2; }
      .services { grid-column: 1; grid-row: 3; }
      .about-panel { grid-column: 1; grid-row: 4; }
    }
  </style>
</head>
<body class="preview">
  <div class="container">

    <header class="header">
      <div class="brand">
        <img src="/nit-trichy-logo.png" alt="NIT Trichy" />
        <img src="{{logo}}" alt="{{name}} logo" />
        <div class="brand-text">
          <strong>{{name}}</strong>
          <span>{{tagline}}</span>
        </div>
      </div>
      <div class="header-tag">Creative Studio</div>
    </header>

    <section class="hero">
      <div class="hero-card">
        <div class="hero-content">
          <div class="hero-tag">{{hours}}</div>
          <h1>{{name}}</h1>
          <p>{{tagline}}</p>
        </div>
      </div>
    </section>

    <section class="services">
      <h2 class="section-title">What We Offer</h2>
      <div class="services-grid">
        {{services}}
      </div>
    </section>

    <div class="about-panel">
      <div class="about-card">
        <div class="about-overlay">
          <small>The Studio</small>
          <h2>Who We Are</h2>
          <p>{{description}}</p>
        </div>
      </div>
      <footer class="cta">
        <strong>Connect</strong>
        <div class="cta-items">
          <span>{{email}}</span>
          <span>{{phone}}</span>
          <span>{{address}}</span>
          <span>{{hours}}</span>
        </div>
        {{contact_links}}
      </footer>
    </div>

  </div>
</body>
</html>
