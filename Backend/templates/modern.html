<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{name}}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --v1: #4c1d95; --v2: #6d28d9; --v3: #ec4899; --sky: #38bdf8;
      --body-bg: linear-gradient(135deg, #4c1d95 0%, #6d28d9 40%, #ec4899 80%, #38bdf8 100%);
      --glass: rgba(255,255,255,.10);
      --glass-b: rgba(255,255,255,.18);
      --text: #fff; --muted: rgba(255,255,255,.72);
      --radius: 16px; --shadow: 0 4px 24px rgba(0,0,0,.28);
    }

    html, body {
      width: 100%; height: 100%;
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      background: var(--body-bg);
      color: var(--text);
      overflow: hidden;
    }
    body.preview { overflow-y: auto; height: auto; }
    body.published { overflow: hidden; height: 100vh; }

    /* ── SHELL ── */
    .shell {
      width: min(1280px, 98vw);
      margin: 0 auto;
      padding: 14px 16px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    body.preview .shell { height: auto; min-height: 100vh; }

    /* ── glass card helper ── */
    .glass {
      background: var(--glass);
      border: 1px solid var(--glass-b);
      border-radius: var(--radius);
      backdrop-filter: blur(18px);
    }

    /* ══ HEADER ══ */
    .hdr {
      display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
      padding: 10px 18px;
      flex-shrink: 0;
    }
    .hdr-brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .hdr-brand img {
      height: 30px; width: 58px; object-fit: contain;
      border-radius: 8px; flex-shrink: 0;
    }
    .hdr-brand-text { min-width: 0; }
    .hdr-brand-text strong {
      display: block; font-size: .8rem; font-weight: 800;
      letter-spacing: .08em; text-transform: uppercase;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px;
    }
    .hdr-brand-text span {
      display: block; font-size: .66rem; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px;
    }
    .hdr-right { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .hdr-chip {
      font-size: .74rem; color: var(--muted);
      padding: 5px 12px;
      background: rgba(255,255,255,.12); border: 1px solid var(--glass-b);
      border-radius: 999px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; max-width: 200px;
    }

    /* ══ ROW 1 — About  +  Gallery ══ */
    .row1 {
      flex: 1.3 1 0;
      display: grid;
      grid-template-columns: 1fr 1.8fr;
      gap: 12px;
      min-height: 0;
    }

    /* About panel */
    .about-panel {
      padding: 20px;
      display: flex; flex-direction: column; gap: 12px;
      overflow: hidden;
    }
    .about-panel .eyebrow {
      font-size: .68rem; font-weight: 700; letter-spacing: .18em;
      text-transform: uppercase; color: var(--sky);
    }
    .about-panel h2 {
      font-size: clamp(1.3rem, 2vw, 2rem);
      font-weight: 800; line-height: 1.05; letter-spacing: -.02em;
    }
    .about-panel p {
      font-size: .82rem; line-height: 1.7; color: var(--muted);
      overflow-y: auto; flex: 1;
    }

    /* Gallery */
    .gallery-panel {
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      min-height: 0;
    }
    .gallery-panel img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .gallery-panel .gal-badge {
      position: absolute; top: 14px; left: 14px;
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      backdrop-filter: blur(12px);
      padding: 5px 12px; border-radius: 999px;
      font-size: .7rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
    }

    /* ══ ROW 2 — Contact  +  Services ══ */
    .row2 {
      flex: 1 1 0;
      display: grid;
      grid-template-columns: 1fr 1.8fr;
      gap: 12px;
      min-height: 0;
    }

    /* Contact */
    .contact-panel {
      padding: 18px;
      display: flex; flex-direction: column; gap: 10px;
      overflow: hidden;
    }
    .contact-panel h3 {
      font-size: .78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .12em; color: var(--sky); flex-shrink: 0;
    }
    .contact-panel .ct-rows { display: flex; flex-direction: column; gap: 6px; flex: 1; }
    .contact-panel .ct-row {
      display: flex; align-items: flex-start; gap: 8px;
    }
    .contact-panel .ct-row .ct-icon {
      width: 26px; height: 26px; border-radius: 7px;
      background: rgba(255,255,255,.15);
      display: grid; place-items: center; font-size: .78rem; flex-shrink: 0;
    }
    .contact-panel .ct-row span {
      font-size: .78rem; color: var(--muted); line-height: 1.4;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px;
    }
    .contact-panel .contact-links {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px;
    }
    .contact-panel .contact-links .btn {
      display: inline-flex; align-items: center;
      padding: 6px 12px; border-radius: 9px;
      text-decoration: none; font-size: .73rem; font-weight: 700;
      transition: opacity .2s;
    }
    .contact-panel .contact-links .btn:hover { opacity: .8; }
    .contact-panel .contact-links .btn-call { background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.2); }
    .contact-panel .contact-links .btn-wa   { background: #25d366; color: #fff; }
    .contact-panel .contact-links .btn-map  { background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.2); }
    .contact-panel .contact-links .btn-ig   { background: linear-gradient(135deg,#f09433,#dc2743,#bc1888); color:#fff; }
    .contact-panel .contact-links .btn-tw   { background: #1da1f2; color: #fff; }
    .contact-panel .contact-links .btn-yt   { background: #ff0000; color: #fff; }

    /* Services */
    .services-panel {
      padding: 18px;
      display: flex; flex-direction: column; gap: 10px;
      overflow: hidden;
    }
    .services-panel h3 {
      font-size: .78rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .12em; color: var(--sky); flex-shrink: 0;
    }
    .svc-scroll { flex: 1; overflow-y: auto; display: flex; gap: 10px; flex-wrap: wrap; align-content: flex-start; }

    /* ── Cards generated by backend ── */
    .feature-card {
      flex: 1 1 150px; min-width: 140px; max-width: 220px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      display: flex; flex-direction: column; gap: 6px;
      overflow: hidden;
    }
    .feature-card > span {
      width: 28px; height: 28px; border-radius: 7px;
      display: grid; place-items: center;
      background: rgba(255,255,255,.2);
      font-size: .73rem; font-weight: 800; flex-shrink: 0;
    }
    .feature-card-image {
      width: 100%; height: 58px;
      object-fit: cover; border-radius: 8px;
      display: block; flex-shrink: 0;
    }
    .feature-card h3 {
      font-size: .8rem; font-weight: 700;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 1; -webkit-box-orient: vertical;
    }
    .feature-card p {
      font-size: .72rem; color: var(--muted); line-height: 1.4;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }

    /* ── Mobile ── */
    @media (max-width: 860px) {
      html, body { overflow-y: auto; height: auto; }
      .shell { height: auto; }
      .row1, .row2 { grid-template-columns: 1fr; flex: none; }
      .gallery-panel { aspect-ratio: 16/9; }
      .about-panel p { overflow-y: visible; }
      .svc-scroll { overflow-y: visible; }
    }
  </style>
</head>
<body class="preview">
<div class="shell">

  <!-- HEADER -->
  <header class="hdr glass">
    <div class="hdr-brand">
      <img src="/nit-trichy-logo.png" alt="NIT Trichy" />
      <img src="{{logo}}" alt="{{name}} logo" />
      <div class="hdr-brand-text">
        <strong>{{name}}</strong>
        <span>{{tagline}}</span>
      </div>
    </div>
    <div class="hdr-right">
      <span class="hdr-chip">{{phone}}</span>
      <span class="hdr-chip">{{email}}</span>
    </div>
  </header>

  <!-- ROW 1: About + Gallery -->
  <div class="row1">

    <div class="glass about-panel">
      <div class="eyebrow">About Us</div>
      <h2>{{name}}</h2>
      <p>{{description}}</p>
    </div>

    <div class="gallery-panel">
      <img src="{{hero_image}}" alt="{{name}}"
           onerror="this.onerror=null;this.src='https://picsum.photos/seed/hero/1200/800';" />
      <div class="gal-badge">Gallery</div>
    </div>

  </div>

  <!-- ROW 2: Contact + Services -->
  <div class="row2">

    <div class="glass contact-panel">
      <h3>Contact</h3>
      <div class="ct-rows">
        <div class="ct-row"><span class="ct-icon">📞</span><span>{{phone}}</span></div>
        <div class="ct-row"><span class="ct-icon">✉️</span><span>{{email}}</span></div>
        <div class="ct-row"><span class="ct-icon">📍</span><span>{{address}}</span></div>
        <div class="ct-row"><span class="ct-icon">🕐</span><span>{{hours}}</span></div>
      </div>
      {{contact_links}}
    </div>

    <div class="glass services-panel">
      <h3>What We Offer</h3>
      <div class="svc-scroll">
        {{services}}
      </div>
    </div>

  </div>
  <!-- hidden: keeps backend image resolver happy -->
  <img src="{{about_image}}" alt="" style="display:none;" />

</div>
</body>
</html>
