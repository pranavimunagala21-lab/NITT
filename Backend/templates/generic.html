<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{name}}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue-1:   #2563eb;
      --blue-2:   #1d4ed8;
      --blue-lt:  #dbeafe;
      --blue-xl:  #eff6ff;
      --text:     #0f172a;
      --muted:    #64748b;
      --border:   #e2e8f0;
      --surface:  #ffffff;
      --radius:   14px;
      --shadow:   0 2px 12px rgba(0,0,0,.08);
    }

    html, body {
      width: 100%; height: 100%;
      font-family: "Inter", system-ui, sans-serif;
      background: linear-gradient(160deg, var(--blue-xl) 0%, #f8fafc 60%, var(--blue-lt) 100%);
      color: var(--text);
      overflow: hidden;
    }

    /* ── preview allows scroll, published locks to viewport ── */
    body.preview { overflow-y: auto; height: auto; }
    body.published { overflow: hidden; height: 100vh; }

    /* ── OUTER SHELL ── */
    .shell {
      width: min(1280px, 98vw);
      margin: 0 auto;
      padding: 14px 16px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    body.preview .shell { height: auto; min-height: 100vh; }

    /* ══ HEADER ══ */
    .hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 18px;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }
    .hdr-brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .hdr-brand img {
      height: 30px; width: 58px; object-fit: contain;
      border-radius: 8px; flex-shrink: 0;
    }
    .hdr-brand-text { min-width: 0; }
    .hdr-brand-text strong {
      display: block; font-size: .82rem; font-weight: 800;
      color: var(--blue-1);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px;
    }
    .hdr-brand-text span {
      display: block; font-size: .68rem; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 240px;
    }
    .hdr-contact { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    .hdr-contact span {
      font-size: .74rem; color: var(--muted);
      padding: 5px 11px; background: var(--blue-xl);
      border-radius: 8px; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis; max-width: 180px;
    }

    /* ══ BODY — three-column ══ */
    .body {
      flex: 1 1 0;
      display: grid;
      grid-template-columns: 1fr 2fr 1fr;
      gap: 12px;
      min-height: 0;
    }

    /* ── LEFT: About ── */
    .col-about {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow: hidden;
    }
    .col-about h2 {
      font-size: .82rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--blue-1);
    }
    .col-about p {
      font-size: .82rem; line-height: 1.65; color: var(--muted);
      overflow-y: auto; flex: 1;
    }
    /* logo watermark */
    .col-about .about-logo {
      margin-top: auto; display: flex; justify-content: center;
    }
    .col-about .about-logo img {
      height: 36px; width: auto; object-fit: contain; opacity: .5;
    }

    /* ── MIDDLE: Gallery / Hero ── */
    .col-gallery {
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow);
      position: relative;
      min-height: 0;
    }
    .col-gallery img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .col-gallery .gallery-title {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 20px 22px 16px;
      background: linear-gradient(to top, rgba(0,0,0,.7) 0%, transparent 100%);
      color: #fff;
    }
    .col-gallery .gallery-title h1 {
      font-size: clamp(1.4rem, 2.5vw, 2.2rem);
      font-weight: 800; line-height: 1.1;
      overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .col-gallery .gallery-title p {
      font-size: .82rem; opacity: .88; margin-top: 4px;
      overflow: hidden;
      display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical;
    }

    /* ── RIGHT: Services ── */
    .col-services {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }
    .col-services h2 {
      font-size: .82rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: .08em; color: var(--blue-1); flex-shrink: 0;
    }
    .svc-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .service-card {
      padding: 12px 14px;
      border-radius: 10px;
      background: var(--blue-xl);
      border: 1px solid var(--blue-lt);
      display: flex; flex-direction: column; gap: 6px;
    }
    .service-card-image {
      width: 100%; height: 60px;
      object-fit: cover; border-radius: 8px;
      display: block; flex-shrink: 0;
    }
    .service-card h3 {
      font-size: .8rem; font-weight: 700; color: var(--text);
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 1; -webkit-box-orient: vertical;
    }
    .service-card p {
      font-size: .73rem; color: var(--muted); line-height: 1.45;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .service-card > span {
      width: 26px; height: 26px; border-radius: 6px;
      display: grid; place-items: center;
      background: var(--blue-1); color: #fff;
      font-size: .7rem; font-weight: 800; flex-shrink: 0;
    }

    /* ══ CONTACT BAR ══ */
    .contact-bar {
      background: linear-gradient(135deg, var(--blue-1), var(--blue-2));
      border-radius: var(--radius);
      padding: 14px 20px;
      display: flex; align-items: center; flex-wrap: wrap; gap: 14px;
      box-shadow: var(--shadow);
      flex-shrink: 0;
      color: #fff;
    }
    .contact-bar .ct-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .contact-bar .ct-info strong { font-size: .88rem; font-weight: 700; }
    .contact-bar .ct-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .contact-bar .ct-chips span {
      font-size: .72rem; padding: 4px 10px;
      background: rgba(255,255,255,.15); border-radius: 999px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px;
    }

    /* contact_links inside contact bar */
    .contact-bar .contact-links { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 0; }
    .contact-bar .contact-links .btn {
      display: inline-flex; align-items: center;
      padding: 7px 13px; border-radius: 9px;
      text-decoration: none; font-size: .76rem; font-weight: 700;
      transition: opacity .2s;
    }
    .contact-bar .contact-links .btn:hover { opacity: .8; }
    .contact-bar .contact-links .btn-call { background: rgba(255,255,255,.9); color: var(--blue-2); }
    .contact-bar .contact-links .btn-wa   { background: #25d366; color: #fff; }
    .contact-bar .contact-links .btn-map  { background: #fff; color: #1a73e8; }
    .contact-bar .contact-links .btn-ig   { background: linear-gradient(135deg,#f09433,#dc2743,#bc1888); color:#fff; }
    .contact-bar .contact-links .btn-tw   { background: #1da1f2; color: #fff; }
    .contact-bar .contact-links .btn-yt   { background: #ff0000; color: #fff; }

    /* ── Mobile ── */
    @media (max-width: 860px) {
      html, body { overflow-y: auto; height: auto; }
      .shell { height: auto; padding: 12px; }
      .body { grid-template-columns: 1fr; }
      .col-gallery { aspect-ratio: 16/9; height: auto; }
      .col-about p { overflow-y: visible; }
      .svc-scroll { overflow-y: visible; }
    }
  </style>
</head>
<body class="preview">
<div class="shell">

  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-brand">
      <img src="/nit-trichy-logo.png" alt="NIT Trichy" />
      <img src="{{logo}}" alt="{{name}} logo" />
      <div class="hdr-brand-text">
        <strong>{{name}}</strong>
        <span>{{tagline}}</span>
      </div>
    </div>
    <div class="hdr-contact">
      <span>{{phone}}</span>
      <span>{{email}}</span>
    </div>
  </header>

  <!-- THREE-COLUMN BODY -->
  <div class="body">

    <!-- LEFT: About -->
    <div class="col-about">
      <h2>About Us</h2>
      <p>{{description}}</p>
      <div class="about-logo">
        <img src="/nit-trichy-logo.png" alt="NIT Trichy" />
      </div>
    </div>

    <!-- MIDDLE: Hero Gallery -->
    <div class="col-gallery">
      <img src="{{hero_image}}" alt="{{name}}"
           onerror="this.onerror=null;this.src='https://picsum.photos/seed/hero/1200/800';" />
      <div class="gallery-title">
        <h1>{{name}}</h1>
        <p>{{tagline}}</p>
      </div>
    </div>

    <!-- RIGHT: Services -->
    <div class="col-services">
      <h2>Our Services</h2>
      <div class="svc-scroll">
        {{services}}
      </div>
    </div>

  </div>

  <!-- CONTACT BAR -->
  <div class="contact-bar">
    <div class="ct-info">
      <strong>Get in Touch</strong>
      <div class="ct-chips">
        <span>{{phone}}</span>
        <span>{{email}}</span>
        <span>{{address}}</span>
        <span>{{hours}}</span>
      </div>
    </div>
    {{contact_links}}
  </div>
  <!-- hidden: keeps backend image resolver happy -->
  <img src="{{about_image}}" alt="" style="display:none;" />

</div>
</body>
</html>
