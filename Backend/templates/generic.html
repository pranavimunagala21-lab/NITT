<!DOCTYPE html>
<html>
<head>
  <title>{{name}}</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #243044;
    }

    .hero {
      min-height: 460px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
      color: white;
      background-image: linear-gradient(rgba(23, 32, 51, 0.55), rgba(23, 32, 51, 0.55)), url('{{hero_image}}');
      background-size: cover;
      background-position: center;
      box-sizing: border-box;
    }

    .hero-inner {
      max-width: 760px;
    }

    .logo {
      width: 80px;
      height: 80px;
      object-fit: contain;
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0;
      font-size: 46px;
      line-height: 1.1;
    }

    .hero p {
      margin: 16px 0 0;
      font-size: 20px;
      color: #ffffff;
    }

    .section {
      max-width: 900px;
      margin: 28px auto;
      padding: 34px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 12px 32px rgba(23, 32, 51, 0.09);
      box-sizing: border-box;
    }

    h2 {
      margin: 0 0 18px;
      color: #172033;
      font-size: 28px;
    }

    p {
      color: #536173;
      line-height: 1.7;
    }

    .about-card {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px;
      align-items: center;
    }

    .section-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 12px;
    }

    ul {
      margin: 0;
      padding-left: 22px;
      color: #3e4b5f;
      line-height: 1.9;
    }

    li {
      margin-bottom: 8px;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .contact-grid p {
      margin: 0;
      padding: 14px;
      border-radius: 10px;
      background: #f5f7fb;
    }

    @media (max-width: 760px) {
      .about-card,
      .contact-grid {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 36px;
      }
    }
  </style>
</head>

<body>
  <div class="hero">
    <div class="hero-inner">
      <img src="{{logo}}" class="logo" />
      <h1 contenteditable="true">{{name}}</h1>
      <p contenteditable="true">{{tagline}}</p>
    </div>
  </div>

  <div class="section about-card">
    <img src="{{about_image}}" class="section-img" />
    <div>
      <h2 contenteditable="true">About Us</h2>
      <p contenteditable="true">{{description}}</p>
    </div>
  </div>

  <div class="section">
    <h2 contenteditable="true">Our Services</h2>
    <ul>
      {{services}}
    </ul>
  </div>

  <div class="section">
    <h2 contenteditable="true">Contact</h2>
    <div class="contact-grid">
      <p><strong>Phone:</strong> {{phone}}</p>
      <p><strong>Email:</strong> {{email}}</p>
      <p><strong>Address:</strong> {{address}}</p>
      <p><strong>Hours:</strong> {{hours}}</p>
    </div>
  </div>
</body>
</html>
