<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{name}}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Manrope:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* ── Theme: Dark Luxury – deep backgrounds, gold accents, cream text ── */
      --gold-bright:  #d0ac6e;        /* warm gold highlight */
      --gold-dim:     rgba(208, 172, 110, 0.55);
      --dark-1:       #0a0a0a;        /* near-black base     */
      --dark-2:       #141008;        /* warm dark tone      */
      --dark-mid:     #1a1508;        /* midpoint warm dark  */

      /* Body: subtle radial warmth, not flat black */
      --body-bg:   radial-gradient(ellipse at 60% 10%, #1c1305 0%, var(--dark-1) 65%);

      /* Semantic aliases */
      --primary:         var(--gold-bright);
      --accent:          var(--gold-bright);
      --radius:          4px;
      --primary-rgb:     208, 172, 110;
      --text-rgb:        245, 239, 230;

      --bg:      var(--dark-1);
      --surface: rgba(var(--text-rgb), 0.03);
      --border:  rgba(var(--primary-rgb), 0.20);
      --gold:    var(--gold-bright);

      /* Text – cream on dark, near-black on gold */
      --text:             #f5efe6;
      --muted:            rgba(245, 239, 230, 0.55);
      --text-on-primary:  #0a0a0a;
      --text-on-gradient: #0a0a0a;
    }

    html, body {
      width: 100%;
      margin: 0;
      padding: 0;
      font-family: "Cormorant Garamond", Georgia, serif;
      background: var(--body-bg);
      color: var(--text);
    }

    /* ── Preview vs Published ── */
    body.preview {
      overflow-y: auto;
      height: auto;
    }
    body.published {
      height: 100vh;
      overflow: hidden;
    }

    /* ── Container ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 28px;
      display: flex;
      flex-direction: column;
      gap: 0;
      height: 100%;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    body.preview .container { min-height: 100vh; }
    body.published .container { height: 100vh; overflow: hidden; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      flex-shrink: 0;
      padding: 18px 0;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .brand img {
      height: 38px;
      width: auto;
      object-fit: contain;
      flex-shrink: 0;
      border-radius: 4px;
    }

    .brand-text { min-width: 0; }

    .brand-text strong {
      display: block;
      font-family: "Manrope", sans-serif;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--gold);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .brand-text span {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }

    .header-contact {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .header-contact span {
      font-family: "Manrope", sans-serif;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 170px;
    }

    /* ── Hero ── */
    .hero {
      display: flex;
      align-items: center;
      gap: 32px;
      flex-wrap: wrap;
      padding: 40px 0;
      border-bottom: 1px solid var(--border);
    }

    body.preview .hero { min-height: 220px; }
    body.published .hero { flex: 1.4 1 0; min-height: 0; }

    .hero-content {
      flex: 1 1 340px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-width: 0;
    }

    .hero-eyebrow {
      font-family: "Manrope", sans-serif;
      font-size: 0.66rem;
      font-weight: 600;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .hero-content h1 {
      font-size: clamp(2rem, 4vw, 4rem);
      font-weight: 600;
      line-height: 0.92;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .hero-content p {
      font-size: clamp(0.88rem, 1.1vw, 1.1rem);
      color: var(--gold-dim);
      letter-spacing: 0.08em;
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .hero-cta {
      display: inline-flex;
      width: fit-content;
      padding: 12px 28px;
      border: 1px solid var(--gold);
      border-radius: var(--radius);
      font-family: "Manrope", sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }

    .hero-cta:hover { background: var(--gold); color: var(--text-on-primary); }

    .hero-image {
      flex: 0 1 280px;
      min-width: 0;
    }

    .hero-image img {
      width: 100%;
      height: auto;
      object-fit: cover;
      border-radius: var(--radius);
      display: block;
      border: 1px solid var(--border);
    }

    /* ── Services ── */
    .services {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
    }

    body.published .services { flex: 1 1 0; min-height: 0; }

    .services-label {
      font-family: "Manrope", sans-serif;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .services-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .service-line {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(208,172,110,0.1);
    }

    .service-line:last-child { border-bottom: none; }

    .service-line > span:first-child {
      font-family: "Manrope", sans-serif;
      font-size: 0.66rem;
      letter-spacing: 0.2em;
      color: var(--gold);
      flex-shrink: 0;
      width: 24px;
    }

    .service-thumb {
      width: 44px;
      height: 44px;
      border-radius: 6px;
      object-fit: cover;
      flex-shrink: 0;
      border: 1px solid var(--border);
    }

    .service-line .editable {
      font-family: "Manrope", sans-serif;
      font-size: 0.84rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── CTA / Footer ── */
    .cta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      padding: 18px 0;
      flex-shrink: 0;
    }

    .cta-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .cta-info strong {
      font-family: "Manrope", sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }

    .cta-info span {
      font-size: 0.82rem;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 260px;
    }

    .cta-contact {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .cta-contact span {
      font-family: "Manrope", sans-serif;
      font-size: 0.66rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 150px;
    }

    img { max-width: 100%; height: auto; object-fit: cover; }

    /* ── Contact Links ── */
    .contact-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .contact-links .btn {
      display: inline-flex;
      align-items: center;
      padding: 9px 16px;
      border-radius: 4px;
      text-decoration: none;
      font-family: "Manrope", sans-serif;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: opacity 0.2s;
    }

    .contact-links .btn:hover { opacity: 0.75; }
    .contact-links .btn-call { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
    .contact-links .btn-wa { background: transparent; color: var(--gold); border: 1px solid var(--border); }
    .contact-links .btn-map { background: transparent; color: var(--gold); border: 1px solid var(--border); }
    .contact-links .btn-ig { background: transparent; color: var(--gold); border: 1px solid var(--border); }
    .contact-links .btn-tw { background: transparent; color: var(--gold); border: 1px solid var(--border); }
    .contact-links .btn-yt { background: transparent; color: var(--gold); border: 1px solid var(--border); }

    @media (max-width: 768px) {
      .hero { flex-direction: column; gap: 20px; }
      .hero-image { flex: 1 1 100%; }
    }
  </style>
</head>
<body class="preview">
  <div class="container">

    <header class="header">
      <div class="brand">
        <img src="/nit-trichy-logo.png" alt="NIT Trichy" />
        <img src="{{logo}}" alt="{{name}} logo" />
        <div class="brand-text">
          <strong>{{name}}</strong>
          <span>{{tagline}}</span>
        </div>
      </div>
      <div class="header-contact">
        <span>{{phone}}</span>
        <span>{{email}}</span>
      </div>
    </header>

    <section class="hero">
      <div class="hero-content">
        <div class="hero-eyebrow">{{hours}}</div>
        <h1>{{name}}</h1>
        <p>{{tagline}}</p>
        <a href="#" class="hero-cta">Book a Consultation</a>
      </div>
      <div class="hero-image">
        <img src="{{about_image}}" alt="About {{name}}"
             onerror="this.onerror=null;this.src='https://picsum.photos/seed/fallback/800/500';" />
      </div>
    </section>

    <section class="services">
      <div class="services-label">Signature Offerings</div>
      <div class="services-list">
        {{services}}
      </div>
    </section>

    <section class="cta">
      <div class="cta-info">
        <strong>Visit Us</strong>
        <span>{{address}}</span>
      </div>
      <div class="cta-contact">
        <span>{{phone}}</span>
        <span>{{email}}</span>
        <span>{{hours}}</span>
      </div>
      {{contact_links}}
    </section>

  </div>
</body>
</html>
