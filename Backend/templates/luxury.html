<!DOCTYPE html>
<html>
<head>
  <title>{{name}}</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: #eee;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .hero.luxury {
      min-height: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      text-align: center;
      box-sizing: border-box;
    }

    .logo {
      width: 76px;
      height: 76px;
      object-fit: contain;
      margin-bottom: 26px;
      opacity: 0.9;
    }

    .hero h1 {
      margin: 0;
      color: #f6efe2;
      font-size: 64px;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
    }

    .hero p {
      max-width: 620px;
      margin: 18px auto 0;
      color: #c0a062;
      font-size: 20px;
      letter-spacing: 1px;
    }

    .full-image {
      width: 100%;
      height: 400px;
      object-fit: cover;
      display: block;
    }

    .section {
      text-align: center;
      max-width: 600px;
      margin: auto;
      padding: 72px 24px;
    }

    .section p {
      margin: 0;
      color: #ded7c9;
      font-size: 19px;
      line-height: 1.9;
    }

    .services {
      max-width: 720px;
      margin: 0 auto;
      padding: 10px 24px 72px;
      text-align: center;
      border-top: 1px solid rgba(192, 160, 98, 0.35);
      border-bottom: 1px solid rgba(192, 160, 98, 0.35);
    }

    .services p {
      margin: 22px 0;
      color: #f6efe2;
      font-size: 20px;
      letter-spacing: 1px;
    }

    .contact {
      max-width: 760px;
      margin: 0 auto;
      padding: 64px 24px 80px;
      text-align: center;
    }

    .contact h2 {
      margin: 0 0 24px;
      color: #c0a062;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .contact p {
      margin: 10px 0;
      color: #ded7c9;
    }

    strong {
      color: #c0a062;
      font-weight: 400;
    }

    @media (max-width: 720px) {
      .hero h1 {
        font-size: 42px;
      }

      .full-image {
        height: 300px;
      }
    }
  </style>
</head>

<body>
  <div class="hero luxury">
    <img src="{{logo}}" class="logo" />
    <h1 contenteditable="true">{{name}}</h1>
    <p contenteditable="true">{{tagline}}</p>
  </div>

  <img src="{{hero_image}}" class="full-image" />

  <div class="section">
    <p contenteditable="true">{{description}}</p>
  </div>

  <div class="services">
    {{services}}
  </div>

  <div class="contact">
    <h2 contenteditable="true">Contact</h2>
    <p><strong>Phone:</strong> {{phone}}</p>
    <p><strong>Email:</strong> {{email}}</p>
    <p><strong>Address:</strong> {{address}}</p>
    <p><strong>Hours:</strong> {{hours}}</p>
  </div>
</body>
</html>
