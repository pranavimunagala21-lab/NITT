<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{name}}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Manrope:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #d0ac6e; --gold-d: rgba(208,172,110,.55);
      --dark: #0a0a0a; --warm: #1c1305;
      --text: #f5efe6; --muted: rgba(245,239,230,.55);
      --border: rgba(208,172,110,.22);
      --radius: 4px;
    }

    html, body {
      width: 100%; height: 100%;
      font-family: "Cormorant Garamond", Georgia, serif;
      background: radial-gradient(ellipse at 55% 0%, #1c1305 0%, #0a0a0a 65%);
      color: var(--text);
      overflow: hidden;
    }
    body.preview { overflow-y: auto; height: auto; }
    body.published { overflow: hidden; height: 100vh; }

    /* ── SHELL: vertical flex ── */
    .shell {
      width: min(1280px, 98vw);
      margin: 0 auto;
      padding: 14px 20px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 0;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    body.preview .shell { height: auto; min-height: 100vh; }

    /* ══ HEADER ══ */
    .hdr {
      display: flex; align-items: center; justify-content: space-between;
      gap: 14px; padding: 10px 0;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0; flex-wrap: wrap;
    }
    .hdr-brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .hdr-brand img {
      height: 28px; width: 58px; object-fit: contain;
      border-radius: 3px; flex-shrink: 0;
    }
    .hdr-brand-text { min-width: 0; }
    .hdr-brand-text strong {
      display: block;
      font-family: "Manrope", sans-serif;
      font-size: .64rem; font-weight: 700;
      letter-spacing: .24em; text-transform: uppercase;
      color: var(--gold);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px;
    }
    .hdr-brand-text span {
      display: block; font-size: .62rem; color: var(--muted); letter-spacing: .07em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px;
    }
    .hdr-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .hdr-chips span {
      font-family: "Manrope", sans-serif;
      font-size: .66rem; color: var(--muted); letter-spacing: .1em;
      padding: 4px 11px; border: 1px solid var(--border); border-radius: 999px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px;
    }

    /* ══ BODY: left-right split ══ */
    .body {
      flex: 1 1 0;
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 0;
      min-height: 0;
    }

    /* ── LEFT COLUMN: About + Gallery ── */
    .col-left {
      display: flex; flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    /* About */
    .about-block {
      padding: 28px 24px 20px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }
    .about-block .eyebrow {
      font-family: "Manrope", sans-serif;
      font-size: .62rem; font-weight: 600;
      letter-spacing: .32em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 10px;
    }
    .about-block h1 {
      font-size: clamp(1.8rem, 3vw, 3.4rem);
      font-weight: 600; line-height: .92;
      letter-spacing: .04em; text-transform: uppercase;
      overflow: hidden; display: -webkit-box;
      -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      margin-bottom: 12px;
    }
    .about-block p {
      font-size: .86rem; color: var(--gold-d);
      line-height: 1.7; letter-spacing: .04em;
      overflow-y: auto;
      max-height: 7em;
    }
    .about-block .cta-link {
      display: inline-flex; margin-top: 14px;
      padding: 10px 24px;
      border: 1px solid var(--gold); border-radius: var(--radius);
      font-family: "Manrope", sans-serif;
      font-size: .68rem; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--gold); text-decoration: none;
      transition: background .2s, color .2s;
    }
    .about-block .cta-link:hover { background: var(--gold); color: #0a0a0a; }

    /* Gallery */
    .gallery-block {
      flex: 1 1 0;
      overflow: hidden;
      position: relative;
      min-height: 0;
    }
    .gallery-block img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .gallery-block .gal-label {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 18px 22px 14px;
      background: linear-gradient(to top, rgba(0,0,0,.65), transparent);
    }
    .gallery-block .gal-label span {
      font-family: "Manrope", sans-serif;
      font-size: .6rem; letter-spacing: .28em; text-transform: uppercase;
      color: var(--gold);
    }

    /* ── RIGHT COLUMN: Contact + Services ── */
    .col-right {
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    /* Contact */
    .contact-block {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .contact-block .section-lbl {
      font-family: "Manrope", sans-serif;
      font-size: .6rem; font-weight: 600;
      letter-spacing: .3em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 12px;
    }
    .contact-block .ct-rows { display: flex; flex-direction: column; gap: 7px; }
    .contact-block .ct-row {
      display: flex; align-items: baseline; gap: 10px;
    }
    .contact-block .ct-row .lbl {
      font-family: "Manrope", sans-serif;
      font-size: .6rem; font-weight: 600;
      letter-spacing: .16em; text-transform: uppercase;
      color: var(--gold); flex-shrink: 0; width: 56px;
    }
    .contact-block .ct-row span {
      font-size: .8rem; color: var(--muted); letter-spacing: .03em;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1;
    }
    .contact-block .contact-links {
      display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px;
    }
    .contact-block .contact-links .btn {
      display: inline-flex; align-items: center;
      padding: 7px 13px; border-radius: 3px;
      text-decoration: none;
      font-family: "Manrope", sans-serif;
      font-size: .67rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      transition: opacity .2s;
    }
    .contact-block .contact-links .btn:hover { opacity: .75; }
    .contact-block .contact-links .btn-call { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
    .contact-block .contact-links .btn-wa   { background: transparent; color: var(--gold); border: 1px solid var(--border); }
    .contact-block .contact-links .btn-map  { background: transparent; color: var(--gold); border: 1px solid var(--border); }
    .contact-block .contact-links .btn-ig   { background: transparent; color: var(--gold); border: 1px solid var(--border); }
    .contact-block .contact-links .btn-tw   { background: transparent; color: var(--gold); border: 1px solid var(--border); }
    .contact-block .contact-links .btn-yt   { background: transparent; color: var(--gold); border: 1px solid var(--border); }

    /* Services */
    .services-block {
      flex: 1 1 0;
      padding: 20px;
      display: flex; flex-direction: column; gap: 8px;
      overflow: hidden;
    }
    .services-block .section-lbl {
      font-family: "Manrope", sans-serif;
      font-size: .6rem; font-weight: 600;
      letter-spacing: .3em; text-transform: uppercase;
      color: var(--gold); flex-shrink: 0;
    }
    .svc-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 0; }

    /* service lines rendered by backend */
    .service-line {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid rgba(208,172,110,.1);
    }
    .service-line:last-child { border-bottom: none; }
    .service-line > span:first-child {
      font-family: "Manrope", sans-serif;
      font-size: .63rem; letter-spacing: .18em; color: var(--gold);
      flex-shrink: 0; width: 22px;
    }
    .service-thumb {
      width: 40px; height: 40px; border-radius: 4px;
      object-fit: cover; flex-shrink: 0; border: 1px solid var(--border);
    }
    .service-line .editable {
      font-family: "Manrope", sans-serif;
      font-size: .82rem; letter-spacing: .05em; text-transform: uppercase;
      color: var(--text); flex: 1;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* ── Mobile ── */
    @media (max-width: 860px) {
      html, body { overflow-y: auto; height: auto; }
      .shell { height: auto; border: none; padding: 12px; }
      .body { grid-template-columns: 1fr; }
      .col-left { border-right: none; }
      .gallery-block { aspect-ratio: 16/9; flex: none; }
      .about-block p { max-height: none; overflow-y: visible; }
      .svc-scroll { overflow-y: visible; }
    }
  </style>
</head>
<body class="preview">
<div class="shell">

  <!-- HEADER -->
  <header class="hdr">
    <div class="hdr-brand">
      <img src="/nit-trichy-logo.png" alt="NIT Trichy" />
      <img src="{{logo}}" alt="{{name}} logo" />
      <div class="hdr-brand-text">
        <strong>{{name}}</strong>
        <span>{{tagline}}</span>
      </div>
    </div>
    <div class="hdr-chips">
      <span>{{phone}}</span>
      <span>{{email}}</span>
    </div>
  </header>

  <!-- BODY -->
  <div class="body">

    <!-- LEFT: About + Gallery -->
    <div class="col-left">

      <div class="about-block">
        <div class="eyebrow">{{hours}}</div>
        <h1>{{name}}</h1>
        <p>{{description}}</p>
        <a href="#" class="cta-link">Book a Consultation</a>
      </div>

      <div class="gallery-block">
        <img src="{{hero_image}}" alt="{{name}}"
             onerror="this.onerror=null;this.src='https://picsum.photos/seed/lux/900/600';" />
        <div class="gal-label"><span>Gallery</span></div>
      </div>

    </div>

    <!-- RIGHT: Contact + Services -->
    <div class="col-right">

      <div class="contact-block">
        <div class="section-lbl">Contact</div>
        <div class="ct-rows">
          <div class="ct-row"><span class="lbl">Phone</span><span>{{phone}}</span></div>
          <div class="ct-row"><span class="lbl">Email</span><span>{{email}}</span></div>
          <div class="ct-row"><span class="lbl">Address</span><span>{{address}}</span></div>
          <div class="ct-row"><span class="lbl">Hours</span><span>{{hours}}</span></div>
        </div>
        {{contact_links}}
      </div>

      <div class="services-block">
        <div class="section-lbl">Signature Offerings</div>
        <div class="svc-scroll">
          {{services}}
        </div>
      </div>

    </div>

  </div>
    <!-- hidden: keeps backend image resolver happy -->
    <img src="{{about_image}}" alt="" style="display:none;" />

</div>
</body>
</html>
